<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Clone - Secure Account</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎮 Roblox Clone</div>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="showSection('home')" class="nav-link">Home</a>
                <a href="#" onclick="showSection('games')" class="nav-link">Games</a>
                <a href="#" onclick="showSection('profile')" class="nav-link" id="profileLink" style="display:none;">Profile</a>
                <button onclick="handleLogout()" id="logoutBtn" class="btn btn-logout" style="display:none;">Logout</button>
                <button onclick="showSection('login')" id="loginBtn" class="btn btn-primary">Sign In</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Home Section -->
        <section id="home" class="section active">
            <div class="hero">
                <h1>Welcome to Roblox Clone</h1>
                <p>Secure. Safe. Fun.</p>
                <div class="button-group">
                    <button onclick="showSection('register')" class="btn btn-primary btn-large">Create Account</button>
                    <button onclick="showSection('login')" class="btn btn-secondary btn-large">Sign In</button>
                </div>
            </div>
        </section>

        <!-- Login Section -->
        <section id="login" class="section">
            <div class="auth-form">
                <h2>🔐 Sign In</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                    <p class="auth-link">Don't have an account? <a href="#" onclick="showSection('register')">Create one</a></p>
                </form>
            </div>
        </section>

        <!-- Register Section -->
        <section id="register" class="section">
            <div class="auth-form">
                <h2>🆕 Create Account</h2>
                <p class="info-text">Only one account per device</p>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" required placeholder="Choose a username (3+ chars)" minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required placeholder="Create password (8+ chars)" minlength="8">
                        <small class="password-hint">🔒 Passwords are encrypted with SHA-256</small>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <input type="password" id="regConfirmPassword" required placeholder="Confirm password" minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                    <p class="auth-link">Already have an account? <a href="#" onclick="showSection('login')">Sign in</a></p>
                </form>
            </div>
        </section>

        <!-- Games Section -->
        <section id="games" class="section">
            <div class="games-container">
                <h2>🎮 Available Games</h2>
                <div class="games-grid" id="gamesGrid">
                    <!-- Games will be populated here -->
                </div>
            </div>
        </section>

        <!-- Profile Section -->
        <section id="profile" class="section">
            <div class="profile-container">
                <h2>👤 My Profile</h2>
                <div class="profile-info">
                    <div class="profile-item">
                        <label>Username</label>
                        <p id="profileUsername"></p>
                    </div>
                    <div class="profile-item">
                        <label>Email</label>
                        <p id="profileEmail"></p>
                    </div>
                    <div class="profile-item">
                        <label>Account Created</label>
                        <p id="profileCreated"></p>
                    </div>
                    <div class="profile-item">
                        <label>Member Since</label>
                        <p id="profileMemberSince"></p>
                    </div>
                </div>
                <div class="profile-actions">
                    <button onclick="handleLogout()" class="btn btn-logout">Logout</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Message Display -->
    <div id="message" class="message"></div>

    <script src="script.js"></script>
</body>
</html>
